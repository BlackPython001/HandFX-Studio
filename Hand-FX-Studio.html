<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Universe Gesture Image Particles</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #030303;
  color: white;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

#mainCanvas {
  position: absolute;
  inset: 0;
  z-index: 1;
  background: #030303;
}

#webcam {
  position: absolute;
  bottom: 25px;
  right: 25px;
  width: 220px;
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.1);
  z-index: 10;
  transform: scaleX(-1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}

#ui {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  left: 25px;
  width: 280px;
  z-index: 10;
  pointer-events: none;
  background: rgba(12, 12, 14, 0.85);
  padding: 25px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 15px 50px rgba(0,0,0,0.9);
}

h1 {
  margin: 0 0 6px 0;
  font-size: 11px;
  letter-spacing: 2px;
  color: #888;
  text-transform: uppercase;
  font-weight: 700;
}

#gesture-display {
  font-size: 24px;
  font-weight: 900;
  color: #00ffcc;
  text-shadow: 0 0 15px rgba(0,255,204,0.4);
  margin-bottom: 25px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.instruction-list {
  display: flex;
  flex-direction: column;
  gap: 15px;
  font-size: 13px;
  color: #aaa;
}

.instruction-list span {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.instruction-list strong {
  color: #fff;
  background: rgba(255,255,255,0.08);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  width: fit-content;
  border: 1px solid rgba(255,255,255,0.05);
}

.controls-section {
  margin-top: 30px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

#color-indicator {
  width: 100%;
  height: 8px;
  border-radius: 4px;
  background-color: red;
  transition: background-color 0.1s;
  box-shadow: 0 0 15px red;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>

<body>
<canvas id="mainCanvas"></canvas>

<div id="ui">
  <h1>Current Action</h1>
  <div id="gesture-display">LOADING...</div>

  <div class="instruction-list">

    <span><strong>Closed Palm / Fist</strong> Slow Ronaldo image build</span>
    <span><strong>Pinch Thumb + Index</strong> Turn current art into particles and vanish</span>
    <span><strong>Joined Index & Middle</strong> Cycle particle glow color</span>
  </div>

  <div class="controls-section">
    <div id="color-indicator"></div>
  </div>
</div>

const canvas = document.getElementById("mainCanvas");
const ctx = canvas.getContext("2d", { alpha: false });
const videoElement = document.getElementById("webcam");
const gestureDisplay = document.getElementById("gesture-display");
const colorIndicator = document.getElementById("color-indicator");

let W = window.innerWidth;
let H = window.innerHeight;
canvas.width = W;
canvas.height = H;

let particles = [];
let introPoints = [];
let sceneryPoints = [];
let ronaldoPoints = [];

let currentGesture = "NONE";
let previousGesture = "NONE";
let brushHue = 0;

let handX = W / 2;
let handY = H / 2;
let smoothX = W / 2;
let smoothY = H / 2;

let mode = "BOOT";
let modeStart = performance.now();
let buildSource = [];
let buildName = "";
let inputLocked = false;

const INTRO_DRAW_TIME = 3300;
const INTRO_HOLD_TIME = 1200;
const INTRO_VANISH_TIME = 2600;
const ART_BUILD_TIME = 38000;
const VANISH_TIME = 3200;

const MAX_PARTICLES = 62000;

function resizeCanvas() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  rebuildImagesAfterResize();
}

window.addEventListener("resize", resizeCanvas);

function rand(min, max) {
  return min + Math.random() * (max - min);
}

function clamp(n, a, b) {
  return Math.max(a, Math.min(b, n));
}

function colorHSL(h, s = 100, l = 60) {
  return `hsl(${h}, ${s}%, ${l}%)`;
}

function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}

function addParticle(x, y, tx, ty, color, size = 2.0, from = "side") {
  if (particles.length >= MAX_PARTICLES) return;

  let sx = x;
  let sy = y;

  if (from === "right") {
    sx = W + rand(30, 260);
    sy = ty + rand(-120, 120);
  }

  if (from === "hand") {
    sx = smoothX + rand(-40, 40);
    sy = smoothY + rand(-40, 40);
  }

  particles.push({
    x: sx,
    y: sy,
    tx,
    ty,
    vx: rand(-0.25, 0.25),
    vy: rand(-0.25, 0.25),
    color,
    size,
    life: 1,
    settle: rand(0.045, 0.075),
    spin: rand(-0.04, 0.04)
  });
}

function clearParticles() {
  particles = [];
}

function distance3D(a, b) {
  return Math.sqrt(
    Math.pow(a.x - b.x, 2) +
    Math.pow(a.y - b.y, 2) +
    Math.pow(a.z - b.z, 2)
  );
}

function analyzeGesture(landmarks) {
  const handSize = distance3D(landmarks[0], landmarks[9]);

  const isIndexExt = distance3D(landmarks[0], landmarks[8]) / distance3D(landmarks[0], landmarks[5]) > 1.32;
  const isMiddleExt = distance3D(landmarks[0], landmarks[12]) / distance3D(landmarks[0], landmarks[9]) > 1.32;
  const isRingExt = distance3D(landmarks[0], landmarks[16]) / distance3D(landmarks[0], landmarks[13]) > 1.28;
  const isPinkyExt = distance3D(landmarks[0], landmarks[20]) / distance3D(landmarks[0], landmarks[17]) > 1.25;

  const pinchDist = distance3D(landmarks[4], landmarks[8]);
  const thumbPinkyDist = distance3D(landmarks[4], landmarks[20]);

  if (pinchDist < handSize * 0.17) return "PINCH";

  if (isIndexExt && isMiddleExt && !isRingExt && !isPinkyExt) {
    const fingerGap = distance3D(landmarks[8], landmarks[12]);
    if (fingerGap < handSize * 0.25) return "JOINED_FINGERS";
  }

  if (isIndexExt && isMiddleExt && isRingExt && isPinkyExt) return "OPEN_HAND";

  const closedScore =
    (!isIndexExt ? 1 : 0) +
    (!isMiddleExt ? 1 : 0) +
    (!isRingExt ? 1 : 0) +
    (!isPinkyExt ? 1 : 0);

  if (closedScore >= 4 || thumbPinkyDist < handSize * 0.28) return "CLOSED_FIST";

  return "HOVER";
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function boostColor(r, g, b, type) {
  if (type === "ronaldo") {
    r = clamp(r * 1.55 + 18, 0, 255);
    g = clamp(g * 1.55 + 18, 0, 255);
    b = clamp(b * 1.55 + 18, 0, 255);
  } else {
    r = clamp(r * 1.12 + 8, 0, 255);
    g = clamp(g * 1.12 + 8, 0, 255);
    b = clamp(b * 1.12 + 8, 0, 255);
  }

  return `rgb(${r|0},${g|0},${b|0})`;
}

function imageToParticlePoints(img, type) {
  const off = document.createElement("canvas");
  const octx = off.getContext("2d", { willReadFrequently: true });

  let maxW = W * 0.72;
  let maxH = H * 0.78;

  if (type === "scenery") {
    maxW = W * 0.64;
    maxH = H * 0.72;
  }

  const scale = Math.min(maxW / img.width, maxH / img.height);
  const drawW = Math.floor(img.width * scale);
  const drawH = Math.floor(img.height * scale);

  off.width = drawW;
  off.height = drawH;
  octx.drawImage(img, 0, 0, drawW, drawH);

  const data = octx.getImageData(0, 0, drawW, drawH).data;
  const points = [];

  const step = type === "ronaldo" ? 4 : 3;
  const startX = W / 2 - drawW / 2;
  const startY = H / 2 - drawH / 2;

  for (let y = 0; y < drawH; y += step) {
    for (let x = 0; x < drawW; x += step) {
      const i = (y * drawW + x) * 4;
      const a = data[i + 3];
      if (a < 20) continue;

      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];

      const brightness = (r + g + b) / 3;

      if (type === "scenery" && brightness > 248) continue;

      points.push({
        x: startX + x + rand(-0.35, 0.35),
        y: startY + y + rand(-0.35, 0.35),
        color: boostColor(r, g, b, type),
        size: type === "ronaldo" ? 1.75 : 2.05
      });
    }
  }

  if (points.length > MAX_PARTICLES - 1000) {
    const reduced = [];
    const skip = Math.ceil(points.length / (MAX_PARTICLES - 1000));
    for (let i = 0; i < points.length; i += skip) reduced.push(points[i]);
    return reduced;
  }

  return points;
}

function buildIntroPoints() {
  introPoints = [];

  const off = document.createElement("canvas");
  const octx = off.getContext("2d", { willReadFrequently: true });
  off.width = 1600;
  off.height = 520;

  octx.clearRect(0, 0, off.width, off.height);
  octx.textAlign = "center";
  octx.textBaseline = "middle";

  octx.font = "900 88px Segoe UI, Arial";
  octx.fillStyle = "white";
  octx.fillText("Welcome to the Universe of AI", off.width / 2, 210);

  octx.font = "700 44px Segoe UI, Arial";
  octx.fillText("- by Radhemohan Jawanjal", off.width / 2, 325);

  const data = octx.getImageData(0, 0, off.width, off.height).data;
  const palette = ["#00fff7", "#ff00ff", "#fff700", "#ff7a00", "#76ff03", "#7c4dff"];

  const scale = Math.min(W * 0.82 / off.width, H * 0.36 / off.height);
  const finalW = off.width * scale;
  const finalH = off.height * scale;
  const baseX = W / 2 - finalW / 2;
  const baseY = H / 2 - finalH / 2;

  for (let y = 0; y < off.height; y += 6) {
    for (let x = 0; x < off.width; x += 6) {
      const a = data[(y * off.width + x) * 4 + 3];
      if (a > 80) {
        introPoints.push({
          x: baseX + x * scale,
          y: baseY + y * scale,
          color: palette[Math.floor(Math.random() * palette.length)],
          size: 2.1
        });
      }
    }
  }
}

let loadedSceneryImg = null;
let loadedRonaldoImg = null;

async function boot() {
  try {
    gestureDisplay.innerText = "LOADING IMAGES";
    loadedSceneryImg = await loadImage(SCENERY_SRC);
    loadedRonaldoImg = await loadImage(RONALDO_SRC);
    buildIntroPoints();
    sceneryPoints = imageToParticlePoints(loadedSceneryImg, "scenery");
    ronaldoPoints = imageToParticlePoints(loadedRonaldoImg, "ronaldo");
    mode = "IDLE";
    gestureDisplay.innerText = "READY";
  } catch (err) {
    console.error(err);
    mode = "IDLE";
    gestureDisplay.innerText = "IMAGE LOAD ERROR";
  }
}

function rebuildImagesAfterResize() {
  if (!loadedSceneryImg || !loadedRonaldoImg) return;
  buildIntroPoints();
  sceneryPoints = imageToParticlePoints(loadedSceneryImg, "scenery");
  ronaldoPoints = imageToParticlePoints(loadedRonaldoImg, "ronaldo");
}

function startIntroThenScenery() {
  clearParticles();
  buildSource = introPoints;
  buildName = "INTRO";
  mode = "INTRO_DRAW";
  modeStart = performance.now();
  inputLocked = true;
}

function startRonaldoBuild() {
  clearParticles();
  buildSource = ronaldoPoints;
  buildName = "RONALDO";
  mode = "IMAGE_BUILD";
  modeStart = performance.now();
  inputLocked = true;
}

function startSceneryBuild() {
  clearParticles();
  buildSource = sceneryPoints;
  buildName = "SCENERY";
  mode = "IMAGE_BUILD";
  modeStart = performance.now();
}

function startVanish() {
  if (particles.length === 0) return;

  for (const p of particles) {
    p.vx = rand(2.0, 6.5);
    p.vy = rand(-2.4, 2.4);
    p.life = 1;
  }

  mode = "VANISH";
  modeStart = performance.now();
  inputLocked = true;
}

function buildFromSource(source, totalTime, fromType) {
  const progress = clamp((performance.now() - modeStart) / totalTime, 0, 1);
  const eased = easeOutCubic(progress);
  const targetCount = Math.floor(source.length * progress);

  while (particles.length < targetCount) {
    const p = source[particles.length];
    addParticle(p.x, p.y, p.x, p.y, p.color, p.size, fromType);
  }

  for (const p of particles) {
    p.x += (p.tx - p.x) * p.settle;
    p.y += (p.ty - p.y) * p.settle;
    p.x += Math.sin(performance.now() * 0.002 + p.tx) * 0.05;
    p.y += Math.cos(performance.now() * 0.002 + p.ty) * 0.05;
  }

  return progress >= 1;
}

function updateParticles() {
  if (mode === "VANISH") {
    const t = clamp((performance.now() - modeStart) / VANISH_TIME, 0, 1);

    for (const p of particles) {
      p.vx += 0.08;
      p.vy += Math.sin(performance.now() * 0.006 + p.x) * 0.04;
      p.x += p.vx;
      p.y += p.vy;
      p.life = 1 - t;
    }

    particles = particles.filter(p => p.life > 0.03 && p.x < W + 500);

    if (t >= 1) {
      clearParticles();
      mode = "IDLE";
      inputLocked = false;
    }
    return;
  }

  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.92;
    p.vy *= 0.92;
  }
}

function render() {
  ctx.fillStyle = "rgba(3,3,3,0.24)";
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.globalCompositeOperation = "lighter";

  for (const p of particles) {
    if (p.life <= 0) continue;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
  ctx.globalAlpha = 1;
}

function manualDraw() {
  const col = colorHSL(brushHue * 360);
  for (let i = 0; i < 6; i++) {
    addParticle(
      smoothX + rand(-8, 8),
      smoothY + rand(-8, 8),
      smoothX,
      smoothY,
      col,
      rand(1.7, 2.8),
      "none"
    );
  }
}

function handleModes() {
  const gestureText = currentGesture.replace("_", " ");

  if (mode === "IDLE") {
    gestureDisplay.innerText = gestureText;

    if (currentGesture === "OPEN_HAND" && previousGesture !== "OPEN_HAND") {
      gestureDisplay.style.color = "#00ffff";
      startIntroThenScenery();
    }

    if (currentGesture === "CLOSED_FIST" && previousGesture !== "CLOSED_FIST") {
      gestureDisplay.style.color = "#ff4040";
      startRonaldoBuild();
    }

    if (currentGesture === "PINCH") {
      if (particles.length > 400) {
        gestureDisplay.style.color = "#ff00ff";
        startVanish();
      } else {
        gestureDisplay.style.color = "#ff00ff";
        manualDraw();
      }
    }

    if (currentGesture === "JOINED_FINGERS") {
      gestureDisplay.style.color = "#00ff44";
      brushHue += 0.012;
      if (brushHue > 1) brushHue = 0;
    }

    return;
  }

  if (mode === "INTRO_DRAW") {
    gestureDisplay.innerText = "AI INTRO";
    gestureDisplay.style.color = "#00ffff";
    const done = buildFromSource(introPoints, INTRO_DRAW_TIME, "right");
    if (done) {
      mode = "INTRO_HOLD";
      modeStart = performance.now();
    }
    return;
  }

  if (mode === "INTRO_HOLD") {
    gestureDisplay.innerText = "WELCOME";
    gestureDisplay.style.color = "#ff00ff";

    for (const p of particles) {
      p.x += (p.tx - p.x) * 0.04;
      p.y += (p.ty - p.y) * 0.04;
    }

    if (performance.now() - modeStart > INTRO_HOLD_TIME) {
      for (const p of particles) {
        p.vx = rand(2.5, 6.5);
        p.vy = rand(-1.6, 1.6);
      }
      mode = "INTRO_VANISH";
      modeStart = performance.now();
    }
    return;
  }

  if (mode === "INTRO_VANISH") {
    gestureDisplay.innerText = "MIXING PARTICLES";
    gestureDisplay.style.color = "#fff700";

    const t = clamp((performance.now() - modeStart) / INTRO_VANISH_TIME, 0, 1);

    for (const p of particles) {
      p.vx += 0.08;
      p.x += p.vx;
      p.y += p.vy;
      p.life = 1 - t;
    }

    particles = particles.filter(p => p.life > 0.04 && p.x < W + 400);

    if (t >= 1) {
      startSceneryBuild();
    }
    return;
  }

  if (mode === "IMAGE_BUILD") {
    gestureDisplay.innerText = buildName === "RONALDO" ? "BUILDING RONALDO" : "DRAWING SCENERY";
    gestureDisplay.style.color = buildName === "RONALDO" ? "#ff4040" : "#00ffcc";

    const done = buildFromSource(buildSource, ART_BUILD_TIME, "right");

    if (done) {
      mode = "COMPLETE";
      inputLocked = false;
    }
    return;
  }

  if (mode === "COMPLETE") {
    gestureDisplay.innerText = "ART COMPLETE";
    gestureDisplay.style.color = "#00ff44";

    if (currentGesture === "PINCH") {
      startVanish();
    }

    if (currentGesture === "OPEN_HAND" && previousGesture !== "OPEN_HAND") {
      startIntroThenScenery();
    }

    if (currentGesture === "CLOSED_FIST" && previousGesture !== "CLOSED_FIST") {
      startRonaldoBuild();
    }
    return;
  }

  if (mode === "VANISH") {
    gestureDisplay.innerText = "VANISHING";
    gestureDisplay.style.color = "#ff00ff";
  }
}

function animate() {
  requestAnimationFrame(animate);

  smoothX += (handX - smoothX) * 0.22;
  smoothY += (handY - smoothY) * 0.22;

  colorIndicator.style.backgroundColor = colorHSL(brushHue * 360);
  colorIndicator.style.boxShadow = `0 0 15px ${colorHSL(brushHue * 360)}`;

  handleModes();
  updateParticles();
  render();

  previousGesture = currentGesture;
}

function setupHands() {
  const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.78,
    minTrackingConfidence: 0.78
  });

  hands.onResults(results => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
      const landmarks = results.multiHandLandmarks[0];
      currentGesture = analyzeGesture(landmarks);

      const mx = (landmarks[4].x + landmarks[8].x) / 2;
      const my = (landmarks[4].y + landmarks[8].y) / 2;

      handX = W - mx * W;
      handY = my * H;
    } else {
      currentGesture = "NONE";
    }
  });

  const cameraFeed = new Camera(videoElement, {
    onFrame: async () => {
      await hands.send({ image: videoElement });
    },
    width: 320,
    height: 240
  });

  cameraFeed.start();
}

ctx.fillStyle = "#030303";
ctx.fillRect(0, 0, W, H);

boot();
setupHands();
animate();

window.addEventListener("keydown", e => {
  const key = e.key.toLowerCase();

  if (key === "o" && mode === "IDLE") {
    currentGesture = "OPEN_HAND";
    startIntroThenScenery();
  }

  if (key === "f" && mode === "IDLE") {
    currentGesture = "CLOSED_FIST";
    startRonaldoBuild();
  }

  if (key === "p") {
    startVanish();
  }
});
</script>
</body>
</html>
